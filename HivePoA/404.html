<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <title>HivePoA</title>
    <script data-hivepoa-pages-spa-redirect>
      (function (location) {
        var segments = 1;
        var base = location.pathname.split("/").slice(0, 1 + segments).join("/") + "/";
        var route = location.pathname.slice(1).split("/").slice(segments).join("/").replace(/&/g, "~and~");
        var query = location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "";
        location.replace(location.protocol + "//" + location.host + base + "?/" + route + query + location.hash);
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
